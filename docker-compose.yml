# ============================================
# TuringMate - Docker Compose
# ============================================
# 编排前后端 + Redis + MySQL 开发环境

services:
  # ---- Frontend (Vue 3 + Vite Dev Server) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=mysql+pymysql://turingmate:turingmate@mysql:3306/turingmate
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      - mysql
      - redis

  # ---- MySQL ----
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: turingmate
      MYSQL_USER: turingmate
      MYSQL_PASSWORD: turingmate
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
